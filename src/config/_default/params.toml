#################### default parameters ################################
# favicon
favicon = "images/brand/blue-ridge-highlands-cropped.png"
# logo
logo = "images/brand/blue-ridge-highlands-cropped.png"
logo_darkmode = "#"
# use `px` or `x` with logo_width = " example: "100px".
# Note: logo_width is not work with .svg file
logo_width = "80px"
# if logo_webp set false, will not generate WEBP version of logo | default is true
logo_webp = true
# logo text will only show when logo is missing.
logo_text = "Blue Ridge Boost"
theme_switcher = false
theme_default = "system" # available options [light/dark/system]
# Main Sections
mainSections = []
# custom script on header, example: custom_script= "<script>console.log(\"Hello World\")</script>"
custom_script = ""
# copyright
theme_copyright = true
copyright = "Copyright by Blue Ridge Boost"
math=true

# ── New homepage params ──
brand_name = "Blue Ridge Boost"
address = "Charlottesville • 2171 Ivy Rd"
full_address = "2171 Ivy Rd • Charlottesville, VA 22903"
phone = "(434) 260‑0636"
phone_raw = "+14342600636"
email = "nora@blueridgeboost.com"
tagline = "Hands-on STEM learning • Ages 6+"

[cta]
text = "Explore Summer Camps"
url = "/summer-camps"

# preloader
# preloader module: https://github.com/gethugothemes/hugo-modules/tree/master/components/preloader
[preloader]
enable = true
preloader = "" # use jpg, png, svg or gif format. example - "images/preloader.gif"

# Navigation button
[navigation_button]
enable = false
label = "Get a Demo"
link = "get-demo/"

# crisp chat
# crisp chat module: https://github.com/gethugothemes/hugo-modules/tree/master/components/crisp-chat
[crisp_chat]
enable = false
crisp_website_id = "" # replace this code with yours

# seo meta data for OpenGraph / Twitter Card
[metadata]
author = "Blue Ridge Boost"
image = "images/brand/blue-ridge-highlands-cropped.png"

# matomo tracking: see https://matomo.org/
[matomo]
enable = false
url = ""
id = ""

# baidu analytics: see https://tongji.baidu.com/
[baidu]
enable = false
analytics_id = ""

# plausible analytics: see https://plausible.io/
[plausible]
enable = false
domain = ""

# counter analytics: see https://counter.dev/setup.html
[counter]
enable = false
username = ""

# site verifications
