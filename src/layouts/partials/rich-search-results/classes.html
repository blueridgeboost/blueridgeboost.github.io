        "description": "Brick Bots & Code Blocks \n\t\t A SPIKE Essential Adventure \n\t \n\t\n\t \n\t\t \n\t\t\tWelcome to the Fundamentals of Coding with SPIKE Essential ! Designed for elementary school students, this course uses the LEGO SPIKE Essential kit to teach foundational coding and STEM concepts. Students will assemble robot designs based on real-world robots to foster creativity, problem-solving skills, and an understanding of how robotics is used in practice. Meetings on April 19 and 26, May 3,10, 17, and 30. \n\t\t\n\t\t \n\t\t\t \n\t\t\t\t ⏱️ Duration: 6 Weeks (1.5 hrs/class) \n\t\t\t \n\t\t\t\t 🎒 Ages: Elementary Students \n\t\t\t \n\t\t\t\t \n\t\t\t \n\t\t \n\t\t\n\t\t Course Schedule \n\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 1: Introduction to Robotics & Light Displays \n\t\t\t\t Focus: Light Up Snackbot\n\t\t\t\t \n\t\t\t\t Students are introduced to the LEGO kit and the concept of robots in the workplace. We will build \"Snackbot,\" an office delivery robot, and learn how to program its Light Matrix to display colored patterns and messages.\n\t\t\t\t \n\t\t\t\t Activities: Meet Snackbot, Build Snackbot, Matching Code Activity, and Light Pattern Challenge.\n\t\t\t\t \n\t\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 2: Making Things Move & Squashing Bugs \n\t\t\t\t Focus: Spinny Snackbot & Buggy Bugs\n\t\t\t\t \n\t\t\t\t It’s time to get moving! Students will attach and program motors to make their Snackbot drive. In the second half, we introduce the concept of \"bugs\" in code by building the \"PixelPest\" robot to identify and fix programming errors.\n\t\t\t\t \n\t\t\t\t Activities: Build Spinny Snackbot & PixelPest, \"What is Spinny Snackbot Doing?\", and Bug Builder Challenge.\n\t\t\t\t \n\t\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 3: Lunar Exploration & Navigation \n\t\t\t\t Focus: Journey on the Moon & Dodging Craters\n\t\t\t\t \n\t\t\t\t Students take their skills to space by building \"Iris,\" a lunar rover. We will program Iris to move forward across the lunar surface and learn to execute precise turns to dodge craters.\n\t\t\t\t \n\t\t\t\t Activities: Alien Leapfrog Activity, The Buggy Rover Activity, and \"The Crater is Lava\" Challenge.\n\t\t\t\t \n\t\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 4: Sensors & Pseudocode \n\t\t\t\t Focus: Strawberry Spotting\n\t\t\t\t \n\t\t\t\t Robots need to understand their environment! Students will build the \"Strawberry Sorter\" and learn to use the Color Sensor to detect ripe red strawberries. We will also introduce the \"Wait Until\" block and pseudocode.\n\t\t\t\t \n\t\t\t\t Activities: Build the Strawberry Sorter, \"Make It Grow\" Activity, and Strawberry Spotting Challenge.\n\t\t\t\t \n\t\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 5: Loops & Smart Decisions \n\t\t\t\t Focus: Loopy Strawberries & Sorting Strawberries\n\t\t\t\t \n\t\t\t\t This week focuses on making our code more efficient. Students will identify patterns and use Repeat Loops. Then, they will learn how to program simple and looped decisions using \"if-then-else\" blocks to sort strawberries by color.\n\t\t\t\t \n\t\t\t\t Activities: Loop Game, Dancing Game, and the ultimate Sorting Strawberries Challenge.\n\t\t\t\t \n\t\t\t \n\t\t\t\n\t\t\t \n\t\t\t\t Week 6: Gyroscopes, Events, & Final Challenge \n\t\t\t\t Focus: Tilt it, Shake it, Bot-it!\n\t\t\t\t \n\t\t\t\t In our final week, students will explore event-based programming using the Gyro Sensor. By building \"Bot-it,\" students will learn how tilting and shaking the robot triggers different events. We wrap up with a fun, interactive game!\n\t\t\t\t \n\t\t\t\t Activities: Introduction to Gyroscopes, Build Bot-it, Games with Events, and the final \"Bot-it!\" Challenge.",

        "description": "LEGO Robotics: Build, Code, Explore Students learn to build and program LEGO robots through hands-on challenges inspired by the World Robot Olympiad (WRO) Elementary division. Each week introduces new skills, building toward a mini-competition in the final session. Meetings on April 18 and 25, May 2,9, 16, and 31. ⏱️ Duration: 6 Weeks (1.5 hrs/class) 🎒 Ages: Upper Elementary Students Week 1 — Meet Your Robot Start with the basics: how to build a sturdy robot base, connect motors, and make it move in a straight line. Students learn why structure matters — a wobbly robot is a slow robot! First challenge: build a bot that can cross the room without falling apart. Week 2 — Precision Driving Robots need to go exactly where you tell them. Students program turns, curves, and specific distances using motor rotations. Challenge: navigate a simple course hitting every checkpoint. Week 3 — Sensing the World Introduce color and distance sensors. Students program their robot to detect lines, stop before obstacles, and react to what it \"sees.\" Challenge: follow a line from start to finish without losing the path. Week 4 — Smart Decisions Combine sensors with logic — if the robot sees red, turn left; if blue, turn right. Students learn loops and conditional programming to handle multi-step tasks. Challenge: sort colored objects into the correct zones. Week 5 — Attachments & Strategy Not every job needs the same tool. Students design and build custom attachments — grabbers, pushers, scoops — and program sequences that use them. Challenge: pick up, transport, and deliver objects to a target area. Week 6 — Competition Day Put it all together! Teams tackle a multi-mission mat that combines driving, sensing, and object manipulation. Students plan their strategy, choose their attachments, and run timed attempts. Highest score wins! What Students Learn \n Building: Structural design, gear ratios, and custom attachments \n Coding: Sequential programs, loops, sensor-based decisions \n Problem-solving: Breaking big tasks into smaller steps, debugging when things go wrong \n Teamwork: Planning strategy together and dividing roles",
