  "description": "LEGO Robotics: Build, Code, Explore Students learn to build and program LEGO robots through hands-on challenges inspired by the World Robot Olympiad (WRO) Elementary division. Each week introduces new skills, building toward a mini-competition in the final session. Meetings on April 18 and 25, May 2,9, 16, and 31. ⏱️ Duration: 6 Weeks (1.5 hrs/class) 🎒 Ages: Upper Elementary Students Week 1 — Meet Your Robot Start with the basics: how to build a sturdy robot base, connect motors, and make it move in a straight line. Students learn why structure matters — a wobbly robot is a slow robot! First challenge: build a bot that can cross the room without falling apart. Week 2 — Precision Driving Robots need to go exactly where you tell them. Students program turns, curves, and specific distances using motor rotations. Challenge: navigate a simple course hitting every checkpoint. Week 3 — Sensing the World Introduce color and distance sensors. Students program their robot to detect lines, stop before obstacles, and react to what it \"sees.\" Challenge: follow a line from start to finish without losing the path. Week 4 — Smart Decisions Combine sensors with logic — if the robot sees red, turn left; if blue, turn right. Students learn loops and conditional programming to handle multi-step tasks. Challenge: sort colored objects into the correct zones. Week 5 — Attachments & Strategy Not every job needs the same tool. Students design and build custom attachments — grabbers, pushers, scoops — and program sequences that use them. Challenge: pick up, transport, and deliver objects to a target area. Week 6 — Competition Day Put it all together! Teams tackle a multi-mission mat that combines driving, sensing, and object manipulation. Students plan their strategy, choose their attachments, and run timed attempts. Highest score wins! What Students Learn \n Building: Structural design, gear ratios, and custom attachments \n Coding: Sequential programs, loops, sensor-based decisions \n Problem-solving: Breaking big tasks into smaller steps, debugging when things go wrong \n Teamwork: Planning strategy together and dividing roles",
